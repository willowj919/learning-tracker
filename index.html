<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习规划追踪器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1814;
    --muted: #8A8580;
    --seo: #0F6E56;
    --seo-bg: #E1F5EE;
    --seo-mid: #1D9E75;
    --perf: #3C3489;
    --perf-bg: #EEEDFE;
    --perf-mid: #7F77DD;
    --cro: #633806;
    --cro-bg: #FAEEDA;
    --cro-mid: #BA7517;
    --accent: #1A1814;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header {
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    color: var(--muted);
  }

  .progress-summary {
    display: flex;
    gap: 1.5rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .progress-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .progress-stat .num {
    font-family: 'DM Mono', monospace;
    font-size: 1.75rem;
    font-weight: 500;
    line-height: 1;
  }

  .progress-stat .label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-bar-wrap {
    margin-top: 1.25rem;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .phase-section { margin-bottom: 2.5rem; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    position: sticky;
    top: 0.5rem;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .phase-header.seo { background: var(--seo-bg); }
  .phase-header.perf { background: var(--perf-bg); }
  .phase-header.cro { background: var(--cro-bg); }

  .phase-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .phase-header.seo .phase-dot { background: var(--seo-mid); }
  .phase-header.perf .phase-dot { background: var(--perf-mid); }
  .phase-header.cro .phase-dot { background: var(--cro-mid); }

  .phase-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .phase-header.seo .phase-label { color: var(--seo); }
  .phase-header.perf .phase-label { color: var(--perf); }
  .phase-header.cro .phase-label { color: var(--cro); }

  .phase-progress {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .week-card:hover { border-color: #C8C4BC; }

  .week-card.completed { opacity: 0.6; }

  .week-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.875rem 1rem;
    cursor: pointer;
    user-select: none;
  }

  .week-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 40px;
    flex-shrink: 0;
  }

  .week-title {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .week-badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .seo .week-badge { background: var(--seo-bg); color: var(--seo); }
  .perf .week-badge { background: var(--perf-bg); color: var(--perf); }
  .cro .week-badge { background: var(--cro-bg); color: var(--cro); }

  .expand-icon {
    font-size: 0.7rem;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .week-card.open .expand-icon { transform: rotate(180deg); }

  .week-body {
    display: none;
    padding: 0 1rem 1rem;
    border-top: 1px solid var(--border);
  }

  .week-card.open .week-body { display: block; }

  .task-list { margin-top: 0.875rem; display: flex; flex-direction: column; gap: 6px; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    background: var(--bg);
    transition: background 0.15s;
    cursor: pointer;
  }

  .task-item:hover { background: #EEEAE2; }

  .task-item.done { opacity: 0.5; }

  .task-item.done .task-text { text-decoration: line-through; }

  .task-cb {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: white;
  }

  .task-item.done .task-cb {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-cb svg { display: none; }
  .task-item.done .task-cb svg { display: block; }

  .task-text { font-size: 0.82rem; line-height: 1.5; color: var(--text); flex: 1; }

  .task-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1rem 0 0.4rem;
  }

  .add-task-row {
    display: flex;
    gap: 8px;
    margin-top: 0.75rem;
  }

  .add-task-input {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .add-task-input:focus { border-color: var(--accent); }
  .add-task-input::placeholder { color: var(--muted); }

  .add-task-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    padding: 7px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .add-task-btn:hover { opacity: 0.8; }

  .delete-task {
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    background: none;
    border: none;
  }

  .task-item:hover .delete-task { opacity: 1; }
  .delete-task:hover { color: #cc4444; }

  .reset-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    padding: 6px 12px;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: #cc4444; color: #cc4444; }

  .core-q-card {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }

  .core-q-card p { font-size: 0.78rem; opacity: 0.7; margin-bottom: 6px; }
  .core-q-card h2 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; line-height: 1.4; font-weight: 400; }

  @media (max-width: 500px) {
    .week-body { padding: 0 0.75rem 0.75rem; }
    .progress-summary { gap: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="header-top">
    <h1>学习<br><em>规划追踪</em></h1>
    <button class="reset-btn" onclick="resetAll()">重置进度</button>
  </div>
  <div class="progress-summary">
    <div class="progress-stat">
      <span class="num" id="stat-done">0</span>
      <span class="label">已完成任务</span>
    </div>
    <div class="progress-stat">
      <span class="num" id="stat-total">0</span>
      <span class="label">总任务数</span>
    </div>
    <div class="progress-stat">
      <span class="num" id="stat-weeks">0</span>
      <span class="label">已完成周数</span>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</header>

<div class="core-q-card">
  <p>每次碰到任何 Marketing 问题，先问自己：</p>
  <h2>"这件事影响的是流量、留存、还是转化？"</h2>
</div>

<div id="phases"></div>

</div>

let state = JSON.parse(localStorage.getItem('learning_tracker') || '{}');

function save() {
  localStorage.setItem('learning_tracker', JSON.stringify(state));
}

function getKey(phaseId, weekIdx, taskIdx) {
  return `${phaseId}_w${weekIdx}_t${taskIdx}`;
}

function getCustomKey(phaseId, weekIdx) {
  return `custom_${phaseId}_w${weekIdx}`;
}

function toggleTask(phaseId, weekIdx, taskIdx) {
  const k = getKey(phaseId, weekIdx, taskIdx);
  state[k] = !state[k];
  save();
  render();
}

function addCustomTask(phaseId, weekIdx, inputId) {
  const input = document.getElementById(inputId);
  const text = input.value.trim();
  if (!text) return;
  const k = getCustomKey(phaseId, weekIdx);
  if (!state[k]) state[k] = [];
  state[k].push({ text, done: false });
  input.value = '';
  save();
  render();
}

function toggleCustomTask(phaseId, weekIdx, taskIdx) {
  const k = getCustomKey(phaseId, weekIdx);
  if (state[k] && state[k][taskIdx]) {
    state[k][taskIdx].done = !state[k][taskIdx].done;
    save();
    render();
  }
}

function deleteCustomTask(phaseId, weekIdx, taskIdx) {
  const k = getCustomKey(phaseId, weekIdx);
  if (state[k]) {
    state[k].splice(taskIdx, 1);
    save();
    render();
  }
}

function toggleWeek(cardId) {
  const card = document.getElementById(cardId);
  card.classList.toggle('open');
}

function resetAll() {
  if (confirm('确认重置所有进度？')) {
    state = {};
    save();
    render();
  }
}

function countStats() {
  let done = 0, total = 0, weeksDone = 0;
  DATA.phases.forEach(phase => {
    phase.weeks.forEach((week, wi) => {
      let weekDone = true;
      let weekTotal = week.tasks.length;
      week.tasks.forEach((t, ti) => {
        total++;
        const k = getKey(phase.id, wi, ti);
        if (state[k]) done++;
        else weekDone = false;
      });
      const ck = getCustomKey(phase.id, wi);
      if (state[ck]) {
        state[ck].forEach((ct, ci) => {
          total++;
          if (ct.done) done++;
          else weekDone = false;
        });
      }
      if (weekDone && weekTotal > 0) weeksDone++;
    });
  });
  return { done, total, weeksDone };
}

function render() {
  const { done, total, weeksDone } = countStats();
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-weeks').textContent = weeksDone;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';

  const container = document.getElementById('phases');
  container.innerHTML = '';

  DATA.phases.forEach(phase => {
    let phaseDone = 0, phaseTotal = 0;
    phase.weeks.forEach((week, wi) => {
      week.tasks.forEach((t, ti) => {
        phaseTotal++;
        if (state[getKey(phase.id, wi, ti)]) phaseDone++;
      });
      const ck = getCustomKey(phase.id, wi);
      if (state[ck]) state[ck].forEach(ct => { phaseTotal++; if (ct.done) phaseDone++; });
    });

    const section = document.createElement('div');
    section.className = 'phase-section';

    const hdr = document.createElement('div');
    hdr.className = `phase-header ${phase.id}`;
    hdr.innerHTML = `
      <div class="phase-dot"></div>
      <span class="phase-label">${phase.label}</span>
      <span class="phase-progress">${phaseDone}/${phaseTotal}</span>
    `;
    section.appendChild(hdr);

    phase.weeks.forEach((week, wi) => {
      let weekDone = 0, weekTotal = week.tasks.length;
      week.tasks.forEach((t, ti) => { if (state[getKey(phase.id, wi, ti)]) weekDone++; });
      const ck = getCustomKey(phase.id, wi);
      const customs = state[ck] || [];
      weekTotal += customs.length;
      customs.forEach(ct => { if (ct.done) weekDone++; });

      const cardId = `card_${phase.id}_${wi}`;
      const inputId = `input_${phase.id}_${wi}`;
      const isOpen = state[`open_${cardId}`];
      const isComplete = weekDone === weekTotal && weekTotal > 0;

      const card = document.createElement('div');
      card.className = `week-card ${phase.id}${isComplete ? ' completed' : ''}${isOpen ? ' open' : ''}`;
      card.id = cardId;

      let tasksHtml = week.tasks.map((t, ti) => {
        const done = state[getKey(phase.id, wi, ti)];
        return `
          <div class="task-item${done ? ' done' : ''}" onclick="toggleTask('${phase.id}', ${wi}, ${ti})">
            <div class="task-cb">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div style="flex:1">
              <div class="task-text">${t.text}</div>
              ${t.meta ? `<div class="task-meta">${t.meta}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      let customHtml = customs.map((ct, ci) => `
        <div class="task-item${ct.done ? ' done' : ''}" onclick="toggleCustomTask('${phase.id}', ${wi}, ${ci})">
          <div class="task-cb">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="task-text" style="flex:1">${ct.text}</div>
          <button class="delete-task" onclick="event.stopPropagation();deleteCustomTask('${phase.id}', ${wi}, ${ci})">✕</button>
        </div>`).join('');

      card.innerHTML = `
        <div class="week-header" onclick="toggleWeekCard('${cardId}')">
          <span class="week-num">${week.week}</span>
          <span class="week-title">${week.title}${isComplete ? ' ✓' : ''}</span>
          ${week.badge ? `<span class="week-badge">${week.badge}</span>` : ''}
          <span class="week-progress" style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);margin-right:6px">${weekDone}/${weekTotal}</span>
          <span class="expand-icon">▾</span>
        </div>
        <div class="week-body">
          <div class="section-label">本周任务</div>
          <div class="task-list">
            ${tasksHtml}
            ${customHtml}
          </div>
          <div class="add-task-row">
            <input class="add-task-input" id="${inputId}" placeholder="添加自定义任务..." onkeydown="if(event.key==='Enter')addCustomTask('${phase.id}',${wi},'${inputId}')">
            <button class="add-task-btn" onclick="addCustomTask('${phase.id}',${wi},'${inputId}')">添加</button>
          </div>
        </div>`;

      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

function toggleWeekCard(cardId) {
  const card = document.getElementById(cardId);
  card.classList.toggle('open');
  state[`open_${cardId}`] = card.classList.contains('open');
  save();
}

render();
</script>
</body>
</html>
